<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaser 3 Top-Down RPG</title>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
    <!-- 1. Load the FULL Phaser Library -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <script src="scenes/PreloadScene.js"></script>
    <script src="scenes/StartScene.js"></script>
    <script src="scenes/WorldScene.js"></script>
    <script src="scenes/UIScene.js"></script>

    <script src="main.js"></script>

</html>
